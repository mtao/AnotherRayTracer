name: System Packages CI

on:
  push:
    branches: [main]
    paths:
      - "**.cpp"
      - "**.hpp"
      - "**.hxx"
      - "meson.build"
      - "meson_options.txt"
      - "**/meson.build"
      - "subprojects/*.wrap"
      - ".github/workflows/system-packages.yml"
  pull_request:
    paths:
      - "**.cpp"
      - "**.hpp"
      - "**.hxx"
      - "meson.build"
      - "meson_options.txt"
      - "**/meson.build"
      - "subprojects/*.wrap"
      - ".github/workflows/system-packages.yml"

jobs:
  build:
    name: ${{ matrix.platform.name }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.platform.image }}
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
        platform:
          - name: Ubuntu (GCC 15)
            image: ubuntu-24.04
            cc: gcc-15
            cxx: g++-15
          - name: macOS (Clang)
            image: macos-latest
            cc: clang
            cxx: clang++
    env:
      MESON_VERSION: "1.7.2"
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      # -- Toolchain & packages --
      - name: Install packages (Linux)
        if: runner.os == 'Linux'
        run: |
          # Retry PPA setup — Launchpad occasionally returns transient
          # GPGKeyTemporarilyNotFoundError (HTTP 500) errors.
          for i in 1 2 3 4 5; do
            sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15 ccache
          sudo apt-get install -y libspdlog-dev libfmt-dev catch2 libtbb-dev

      - name: Install packages (macOS)
        if: runner.os == 'macOS'
        run: brew install spdlog fmt catch2 tbb ccache

      - name: Install Meson and Ninja
        run: python -m pip install meson==${{ env.MESON_VERSION }} ninja

      # -- Caches --
      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.platform.image }}-${{ matrix.build_type }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.platform.image }}-${{ matrix.build_type }}-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      - name: Cache subproject downloads
        uses: actions/cache@v5
        with:
          path: subprojects/packagecache
          key: subprojects-${{ hashFiles('subprojects/*.wrap') }}

      # -- Build & Test --
      - name: Configure
        env:
          CC: ccache ${{ matrix.platform.cc }}
          CXX: ccache ${{ matrix.platform.cxx }}
        run: >
          meson setup build/
          --buildtype=${{ matrix.build_type }}
          --wrap-mode=forcefallback
          -Dtesting=true

      - name: Build
        run: meson compile -C build/

      - name: ccache stats
        run: ccache -s

      - name: Test
        run: meson test -C build/ -v

      - name: Upload test log
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ${{ matrix.platform.name }}-${{ matrix.build_type }}-testlog
          path: build/meson-logs/testlog.txt
